<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Olexion - Editor</title>
  <meta name="description"
    content="Free online gradient editor with noise effects, filters, and export options. Create stunning gradients and export to CSS, PNG, JPG, WEBP, or SVG.">
  <meta name="keywords"
    content="gradient generator, CSS gradient, gradient maker, noise gradient, linear gradient, radial gradient, conic gradient">
  <meta name="author" content="Olexion">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <!-- Canonical -->
  <link rel="canonical" href="https://olexion.com/editor.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://olexion.com/editor.html">
  <meta property="og:title" content="Olexion - Editor">
  <meta property="og:description"
    content="Free online gradient editor with noise effects, filters, and export options.">
  <meta property="og:image" content="https://olexion.com/og-image.webp">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Olexion - CSS Gradient Editor">
  <meta name="twitter:description"
    content="Create stunning gradients with noise, filters, and export to CSS or images.">
  <meta name="twitter:image" content="https://olexion.com/og-image.webp">
  <meta name="twitter:creator" content="@OlexionHQ">

  <!-- Theme -->
  <meta name="theme-color" content="#1c1c1c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./LOGO.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="./logo-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./logo-32.png">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/editor.css">
  <link rel="stylesheet" href="./css/style.css">

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Olexion",
      "url": "https://olexion.com/editor.html",
      "description": "Free online gradient generator with noise effects, filters, and export options.",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Linear Gradient",
        "Radial Gradient",
        "Conic Gradient",
        "Noise & Grain Effects",
        "CSS Filters",
        "Blend Modes",
        "PNG/JPG/WEBP/SVG Export",
        "Responsive CSS Code"
      ]
    }
    </script>
</head>

<body>
  <div id="zoomIndicator" class="zoom-indicator"></div>
  <header>
    <img class="logo" src="./LOGO.svg" alt="logo">
    <h1 class="name">Olexion</h1>
    <div style="flex: 1;"></div>
    <div class="theme-select">
      <select id="themeSelect">
        <option value="auto">Auto</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="deep-dark">DeepDark</option>
        <option value="midnight">MidNight</option>
      </select>
    </div>
    <div class="file">
      <button onclick="FileManager.importJSON()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">

              fill="#ffffff" />
          </g>

        </svg>
        Import
      </button>
      <button onclick="FileManager.exportJSON()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">

          <g id="SVGRepo_bgCarrier" stroke-width="0" />

          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

              fill="#ffffff" />
          </g>

        </svg>
        Export
      </button>
    </div>
  </header>
  <div class="aspect-ratio-container">
    <!-- Aspect Ratio Buttons -->
    <div class="aspect-ratio-row">
      <label class="Aspect-Ratio-label">Aspect Ratio</label>
      <div class="aspect-ratio-btns" id="aspectBtns">
        <button class="aspect-btn" data-ratio="free" title="Free">
          Free
        </button>
        <button class="aspect-btn" data-ratio="1:1" title="Square">1:1</button>
        <button class="aspect-btn" data-ratio="4:3" title="4:3">4:3</button>
        <button class="aspect-btn" data-ratio="16:9" title="Widescreen">16:9</button>
        <button class="aspect-btn" data-ratio="9:16" title="Portrait">9:16</button>
      </div>
    </div>
    <!-- Aspect Ratio Inputs -->
    <div class="aspect-input-row">
      <input type="number" id="aspectW" class="aspect-input-num" placeholder="W" min="1" max="100" title="Aspect Width">
      <span class="aspect-separator">:</span>
      <input type="number" id="aspectH" class="aspect-input-num" placeholder="H" min="1" max="100"
        title="Aspect Height">
    </div>
    <div class="resolution-presets">
      <label class="size-label">size</label>
      <div class="preset-btns">
        <button class="preset-btn" data-w="1280" data-h="720">HD</button>
        <button class="preset-btn" data-w="1920" data-h="1080">FHD</button>
        <button class="preset-btn" data-w="2560" data-h="1440">2K</button>
        <button class="preset-btn" data-w="3840" data-h="2160">4K</button>
      </div>
    </div>
    <!-- Size Inputs -->
    <div class="size-inputs-row">
      <div class="size-input-group">
        <label>W</label>
        <input type="number" id="canvasWidth" class="num-input" min="200" max="3840" value="800">
      </div>

      <button class="size-link-btn" id="sizeLinkBtn" title="Link dimensions">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
          <g id="SVGRepo_iconCarrier">
            <path d="M14 7H16C18.7614 7 21 9.23858 21 12C21 14.7614 18.7614 17 16 17H14M10 7H8C5.23858 7 3 9.23858 3 12C3 14.7614 5.23858 17 8 17H10"
                  stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </svg>
      </button>
      <div class="size-input-group">
        <label>H</label>
        <input type="number" id="canvasHeight" class="num-input" min="200" max="2160" value="600">
      </div>
    </div>
    <div class="DimensionBtn-wrapper">
      <button class="swap-Dimension-btn" id="swapSizeBtn" title="Swap dimensions (X)">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  
          <g id="SVGRepo_bgCarrier" stroke-width="0" />

          <g id="SVGRepo_iconCarrier">
            <path
              d="M6 19L3 16M3 16L6 13M3 16H11C12.6569 16 14 14.6569 14 13V12M10 12V11C10 9.34315 11.3431 8 13 8H21M21 8L18 11M21 8L18 5"
              stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </g>
  
        </svg>
        <span>Swap</span>
      </button>
      <button id="toggleDimensionLockBtn" class="dimension-lock-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
    
          <g id="SVGRepo_bgCarrier" stroke-width="0"/>
          
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>
          
          <g id="SVGRepo_iconCarrier"> <path d="M16.584 6C15.8124 4.2341 14.0503 3 12 3C9.23858 3 7 5.23858 7 8V10.0288M7 10.0288C7.47142 10 8.05259 10 8.8 10H15.2C16.8802 10 17.7202 10 18.362 10.327C18.9265 10.6146 19.3854 11.0735 19.673 11.638C20 12.2798 20 13.1198 20 14.8V16.2C20 17.8802 20 18.7202 19.673 19.362C19.3854 19.9265 18.9265 20.3854 18.362 20.673C17.7202 21 16.8802 21 15.2 21H8.8C7.11984 21 6.27976 21 5.63803 20.673C5.07354 20.3854 4.6146 19.9265 4.32698 19.362C4 18.7202 4 17.8802 4 16.2V14.8C4 13.1198 4 12.2798 4.32698 11.638C4.6146 11.0735 5.07354 10.6146 5.63803 10.327C5.99429 10.1455 6.41168 10.0647 7 10.0288Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/> </g>
          
          </svg>
      </button>
    </div>
  </div>

          <g id="SVGRepo_bgCarrier" stroke-width="0" />

    <!-- Zoom Controls -->
    <div class="zoom-controls">
      <button id="zoomOut" title="Zoom Out (Ctrl -)">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">

          <g id="SVGRepo_bgCarrier" stroke-width="0" />

          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />
